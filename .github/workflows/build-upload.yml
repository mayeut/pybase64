name: Build and upload to PyPI

on:
  push:
    tags:
      - '**'
    branches:
      - main
      - master
      - "temp/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  prebuild:
    name: Lint & get SOURCE_DATE_EPOCH
    permissions:
      contents: read
    runs-on: ubuntu-slim
    outputs:
      SOURCE_DATE_EPOCH: ${{ steps.SOURCE_DATE_EPOCH.outputs.SOURCE_DATE_EPOCH }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set SOURCE_DATE_EPOCH output
        id: SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          python-version: "3.12"
      - run: uv run --frozen --only-group nox nox -s lint

  build_wheels:
    name: ${{ matrix.build || matrix.platform }} ${{ matrix.archs }} wheels
    needs: [prebuild]
    permissions:
      contents: read
    runs-on: "${{ matrix.runs-on }}${{ startsWith(matrix.archs, 'aarch64') && '-arm' || '' }}"
    strategy:
      matrix:
        platform: ["linux"]
        archs: ["x86_64, i686", "aarch64, armv7l", "ppc64le", "s390x", "riscv64"]
        build: ["manylinux", "musllinux"]
        runs-on: [ubuntu-24.04]
        include:
          - platform: "windows"
            archs: "AMD64"
            runs-on: windows-2022
          - platform: "windows"
            archs: "x86"
            runs-on: windows-2022
          - platform: "windows"
            archs: "ARM64"
            runs-on: windows-11-arm
          - platform: "macos"
            archs: "x86_64"
            runs-on: macos-15-intel
          - platform: "macos"
            archs: "arm64"
            runs-on: macos-14
          - platform: "ios"
            archs: "x86_64_iphonesimulator"
            runs-on: macos-15-intel
          - platform: "ios"
            archs: "arm64_iphonesimulator,arm64_iphoneos"
            runs-on: macos-14
          - platform: "android"
            archs: "arm64_v8a,x86_64"
            runs-on: ubuntu-24.04
          - platform: "pyodide"
            archs: "wasm32"
            runs-on: ubuntu-24.04
    steps:
      - name: Clean Up runner
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          df -h
          docker system prune -a -f
          sudo rm -rf \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/go \
            /usr/local/share/chromium
          ls -al /opt/hostedtoolcache/
          find /opt/hostedtoolcache/Python -name '*.tgz' -delete
          df -h
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Install a pinned version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          version: "0.11.3"
      - name: Set up QEMU
        if: runner.os == 'Linux' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      # https://github.blog/changelog/2024-04-02-github-actions-hardware-accelerated-android-virtualization-now-available/
      - name: Enable KVM for Android emulator
        if: matrix.platform == 'android' && runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_ARCHS: "${{ matrix.archs }}"
          CIBW_BUILD: "${{ matrix.build && '*-' || ''}}${{ matrix.build }}*"
          CIBW_ENABLE: "${{ startsWith(github.ref, 'refs/tags/v') && '' || 'cpython-prerelease'}}"
          CIBW_PLATFORM: "${{ matrix.platform }}"
          SOURCE_DATE_EPOCH: "${{ needs.prebuild.outputs.SOURCE_DATE_EPOCH }}"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "${{ (matrix.platform != 'pyodide') && 'pypi' || 'cibw' }}-wheels ${{ matrix.build || matrix.platform }} ${{ matrix.archs }}"
          path: ./wheelhouse/*.whl

  build_sdist:
    name: source distribution
    needs: [prebuild]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    env:
      CIBUILDWHEEL: 1  # make C extension mandatory
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Install a pinned version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          python-version: "3.12"
          version: "0.11.3"
      - name: Build sdist
        run: uv build --build-constraints requirements/build/requirements-ci.txt --require-hashes --sdist
        env:
          SOURCE_DATE_EPOCH: "${{ needs.prebuild.outputs.SOURCE_DATE_EPOCH }}"
      - name: Install
        run: uv venv && uv pip install --build-constraints requirements/build/requirements-ci.txt ./dist/pybase64*.tar.gz
      - name: Test
        run: uv run --frozen --only-group test pytest
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  check_dist:
    if: always()
    name: Check dist
    needs: [build_wheels, build_sdist]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks all PyPI artifacts into dist/
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false  # we always want to run the latest twine here, no artifacts are uploaded from this job
          python-version: "3.12"
      - run: |
          set -x
          WHEEL_COUNT=$(find dist -name '*.whl' | wc -l)
          EXPECTED_WHEEL_COUNT=${{ startsWith(github.ref, 'refs/tags/v') && '171' || '171' }}
          test ${WHEEL_COUNT} -eq ${EXPECTED_WHEEL_COUNT}
          uvx twine check --strict dist/*
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks all non PyPI artifacts into nodist/
          pattern: cibw-*
          path: nodist
          merge-multiple: true
      - run: |
          set -x
          WHEEL_COUNT=$(find nodist -name '*.whl' | wc -l)
          EXPECTED_WHEEL_COUNT=${{ startsWith(github.ref, 'refs/tags/v') && '2' || '2' }}
          test ${WHEEL_COUNT} -eq ${EXPECTED_WHEEL_COUNT}
          uvx twine check --strict nodist/*

  upload_test_pypi:
    name: Upload to Test PyPI
    needs: [check_dist]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.repository == 'mayeut/pybase64'
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/pybase64
    permissions:
      id-token: write # trusted publishing + attestations
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks all PyPI artifacts into dist/
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Upload to Test PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    name: Upload to PyPI
    needs: [upload_test_pypi]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.repository == 'mayeut/pybase64' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pybase64
    permissions:
      id-token: write # trusted publishing + attestations
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks all PyPI artifacts into dist/
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true
