name: Coverage

on:
  push:
    branches:
      - main
      - master
      - "temp/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: |
            pypy3.10
            pypy3.11
      - name: Install a pinned version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          activate-environment: true
          python-version: "3.12"
          version: "0.11.3"
      - name: Install nox
        run: uv sync --frozen --only-group nox
      - name: Install Intel SDE, libxml2-dev & libxslt1-dev
        run: |
          curl -fsSLo ${HOME}/sde.tar.xz https://downloadmirror.intel.com/859732/sde-external-9.58.0-2025-06-16-lin.tar.xz
          mkdir ${HOME}/sde
          tar -C ${HOME}/sde --strip-components 1 -xf ${HOME}/sde.tar.xz
          echo "PATH=${HOME}/sde:${PATH}" >> $GITHUB_ENV
          # as long as lxml does not provide 3.15 wheels
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev
      - name: Run coverage tests
        run: nox -s coverage -- --with-sde
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: |
            coverage-native.xml
            coverage-python.xml
          retention-days: 1

  coverage_report:
    name: Coverage Report
    needs: ["coverage"]
    runs-on: ubuntu-slim
    permissions:
      id-token: write  # upload to codecov with OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-native.xml,coverage-python.xml
          use_oidc: true

  check_coverage:
    if: always()
    name: Check coverage
    needs: [coverage_report]
    runs-on: ubuntu-slim
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
