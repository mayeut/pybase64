name: Benchmark

on:
  push:
    branches:
      - main
      - master
      - "temp/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark ${{ matrix.archs }} ${{ matrix.build }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        archs: ["x86_64"]
        build: ["manylinux"]
    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup uv & nox
        uses: ./.github/actions/setup-uv-nox
      - name: Build wheel
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_ARCHS: "${{ matrix.archs }}"
          CIBW_BUILD: "cp312-${{ matrix.build }}*"
      - name: Install dependencies
        run: nox -s benchmark --install-only -- --wheel wheelhouse/*.whl
      - name: Run benchmark
        uses: CodSpeedHQ/action@dbda7111f8ac363564b0c51b992d4ce76bb89f2f # v4.5.2
        with:
          mode: instrumentation
          run: nox -s benchmark --reuse-existing-virtualenvs --no-install -- -v
