name: Setup uv & nox
description: Setup uv & nox

runs:
  using: "composite"
  steps:
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          activate-environment: true
          python-version: "3.12"
      - name: Install nox
        run: uv sync --frozen --only-group nox
        shell: bash
